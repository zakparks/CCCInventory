<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh; background: #f8f9fa;">
  <div class="card shadow" style="width: 360px;">
    <div class="card-body p-4">
      <h4 class="card-title text-center mb-4">CCC Order Inventory</h4>
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input id="username" type="text" class="form-control" [(ngModel)]="username"
            name="username" autocomplete="username" autofocus />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="form-control" [(ngModel)]="password"
            name="password" autocomplete="current-password" />
        </div>
        @if (errorMessage) {
          <div class="alert alert-danger py-2">{{ errorMessage }}</div>
        }
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
          @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
