<header>
  <nav
    class="navbar navbar-expand-sm navbar-toggleable-sm navbar-light bg-white border-bottom box-shadow mb-3"
  >
    <div class="container">
      <a class="navbar-brand" [routerLink]="['/']">CCC Order Inventory</a>
      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target=".navbar-collapse"
        aria-label="Toggle navigation"
        [attr.aria-expanded]="isExpanded"
        (click)="toggle()"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div
        class="navbar-collapse collapse d-sm-inline-flex justify-content-end"
        [ngClass]="{ show: isExpanded }"
      >
        <ul class="navbar-nav flex-grow">
          <li
            class="nav-item"
            [routerLinkActive]="['link-active']"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <a class="nav-link text-dark" [routerLink]="['/']">Overview</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" [routerLink]="['/edit-order']" [routerLinkActive]="['link-active']" >Order Form</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" [routerLink]="['/all-orders']" [routerLinkActive]="['link-active']">All Orders</a>
          </li>
          <!-- Calendar link hidden until Google Calendar integration (Phase 10) -->
          <li class="nav-item">
            <a class="nav-link text-dark" [routerLink]="['/customers']" [routerLinkActive]="['link-active']">Customers</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" [routerLink]="['/bake-sheet']" [routerLinkActive]="['link-active']">Bake Sheet</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" [routerLink]="['/management']" [routerLinkActive]="['link-active']">Management</a>
          </li>
          @if (pinActive) {
            <li class="nav-item d-flex align-items-center ms-2">
              <button type="button" class="btn btn-outline-secondary btn-sm" (click)="switchUser()">{{ activeStaffName }} - Switch User</button>
            </li>
          }
        </ul>
      </div>
    </div>
  </nav>
</header>
