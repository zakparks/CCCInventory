<h1 id="tableLabel">All Orders</h1>

<div class="mb-3 row align-items-center">
  <label for="table-filtering-search" class="col-sm-auto col-form-label">Search:</label>
  <div class="col-sm-auto">
    <input id="table-filtering-search" class="form-control" type="text" [formControl]="filter" placeholder="Name, details, email, order #" />
  </div>
</div>

<table class="table table-striped table-hover" aria-labelledby="tableLabel">
  <thead>
    <tr>
      <th>Order #</th>
      <th>Name</th>
      <th>Details</th>
      <th>Email</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    @for (order of filteredOrders$ | async; track order.orderNumber) {
      <tr>
        <th scope="row">{{ order.orderNumber }}</th>
        <td><ngb-highlight [result]="order.custName ?? ''" [term]="filter.value" /></td>
        <td><ngb-highlight [result]="order.details ?? ''" [term]="filter.value" /></td>
        <td><ngb-highlight [result]="order.custEmail ?? ''" [term]="filter.value" /></td>
        <td>
          <button class="btn btn-sm btn-outline-primary" (click)="editOrder(order.orderNumber!)">Edit</button>
        </td>
      </tr>
    } @empty {
      <tr>
        <td colspan="5" class="text-center text-muted">No orders found</td>
      </tr>
    }
  </tbody>
</table>
