<h1>CCC Order Inventory</h1>

<div class="row g-3 mt-2">
  <div class="col-md-4">
    <app-dashboard-card
      title="New Order"
      description="Create a new customer order."
      cardLink="/edit-order"
      buttonText="Open Order Form"
      buttonClass="btn-primary">
    </app-dashboard-card>
  </div>
  <div class="col-md-4">
    <app-dashboard-card
      title="All Orders"
      description="Search and manage existing orders."
      cardLink="/all-orders"
      buttonText="View All Orders">
    </app-dashboard-card>
  </div>
  <div class="col-md-4">
    <app-dashboard-card
      title="Incomplete Orders"
      description="Orders that are missing required information."
      cardLink="/all-orders"
      [cardQueryParams]="{status: 'incomplete'}"
      buttonText="Incomplete Orders"
      [buttonClass]="hasIncompleteOrders ? 'btn-danger' : 'btn-outline-primary'">
    </app-dashboard-card>
  </div>
  <!-- Calendar card hidden until Google Calendar integration (Phase 10) -->
  <div class="col-md-4">
    <app-dashboard-card
      title="Bake Sheet"
      description="See what needs to be baked this week."
      cardLink="/bake-sheet"
      buttonText="Open Bake Sheet">
    </app-dashboard-card>
  </div>
  <div class="col-md-4">
    <app-dashboard-card
      title="Management"
      description="Manage option lists and signature cupcakes."
      cardLink="/management"
      buttonText="Open Management"
      buttonClass="btn-outline-secondary">
    </app-dashboard-card>
  </div>
</div>
